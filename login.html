<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل دخول الطلاب</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body {
      font-family: 'Tajawal', sans-serif;
      background-image: url('https://tse1.mm.bing.net/th?id=OIP.6rmAzQKLypdTEcktslV6BQHaEJ&pid=Api&P=0&h=220'); 
       background-size: cover;
       background-position: center;
       min-height: 100vh;
       image-rendering: -webkit-optimize-contrast; 
       image-rendering: crisp-edges;
       filter: brightness(1.1) contrast(1.2); 
       display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: linear-gradient(40deg, #0cc039, #ffffff);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgb(0, 17, 0);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(201, 190, 190, 0.932);
      border-color: #000a04;
    }
    .btn-purple {
      background: linear-gradient(to right, #0daf4b, #9d4edd);
      color: #fff;
      border: none;
    }
    .btn-purple:hover {
      background: linear-gradient(to right, #c904bf, #320ae4);
    }
    .text-small {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="login-box text-center">
    <h2 class="mb-4 text-primary">Login For Students</h2>
    <form>
      <div class="mb-3 text-start">
        <label for="email" class="form-label">  Code </label>
        <input type="email" class="form-control" id="email" placeholder="ex: 2244787" required>
      </div>
      <div class="mb-3 text-start">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3 text-small">
        <a href="#" class="text-decoration-none text-primary">forget your password ?</a>
      </div>
      <button type="submit" class="btn btn-purple w-100 py-2">Login</button>
    </form>
    <div class="mt-3 text-small">
    dont have account yet ?<a href="#" class="text-primary text-decoration-none">  Login now  </a>
    </div>
  </div>

</body>
</html>
